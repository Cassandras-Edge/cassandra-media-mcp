name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: 172.20.0.161:30500
  IMAGE_NAME: cassandra-yt-mcp/backend

jobs:
  build-and-push:
    runs-on: gh-arc-cassandra-yt-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend/
          push: true
          build-args: |
            YTDLP_CHANNEL=nightly
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
